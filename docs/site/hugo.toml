baseURL = "https://legacypodclaw.hesketh.pro/"
languageCode = "en-gb"
title = "LegacyPodClaw"
theme = "legacypodclaw"

[params]
  description = "AI assistant for iOS 6 — native Objective-C port of OpenClaw for jailbroken devices"
  author = "Matt Hesketh"
  github = "https://github.com/wrxck/LegacyPodClaw"
  version = "0.3.0"

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    guessSyntax = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

